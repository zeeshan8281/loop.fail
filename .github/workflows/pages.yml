name: pages

on:
  push:
    branches: [main]
    paths: [docs/**, leaderboard.yaml, tasks.yaml]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - run: cp leaderboard.yaml docs/leaderboard.yaml && cp tasks.yaml docs/tasks.yaml   # ensure board is current
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs }
      - id: deploy
        uses: actions/deploy-pages@v4
